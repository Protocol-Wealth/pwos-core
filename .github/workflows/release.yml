name: Release

on:
  push:
    branches:
      - main

# Required so the changesets bot can open / update the version PR and
# (when the version PR is merged) push a release commit.
permissions:
  contents: write
  pull-requests: write
  id-token: write  # for npm provenance

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Version + Publish
    runs-on: ubuntu-latest
    # Do not run on the auto-generated changeset version-PR commits to avoid
    # an infinite loop when the bot's PR is merged back to main.
    if: github.repository == 'Protocol-Wealth/pwos-core'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Required so changesets can read git tags + push commits back.
          fetch-depth: 0
          # GITHUB_TOKEN is fine for opening PRs and writing commits;
          # NPM_TOKEN handles the actual publish step.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Run tests
        run: pnpm -r test

      - name: Create release PR or publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          # When pending changesets exist → opens / updates a "Version Packages" PR.
          # When that PR is merged (no pending changesets) → publishes the new
          # versions to npm.
          publish: pnpm changeset:publish
          version: pnpm changeset:version
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # `NODE_AUTH_TOKEN` is the canonical name `npm` / `pnpm publish`
          # picks up automatically. The repo secret is named NPM_API_KEY per
          # the maintainer's convention — we map it through here so the
          # workflow doesn't need to be re-wired if someone later renames
          # the secret to NPM_TOKEN.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_API_KEY }}
          NPM_TOKEN: ${{ secrets.NPM_API_KEY }}
          # Enable npm provenance for supply-chain trust.
          # Requires id-token: write permission above.
          NPM_CONFIG_PROVENANCE: "true"
