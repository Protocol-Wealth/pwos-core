name: Release (version PR only)

# Publishing is done LOCALLY by the maintainer (`npm login` + `pnpm
# changeset:version` + `pnpm changeset:publish`) per the firm's convention —
# the `NPM_API_KEY` CI secret is intentionally unused. This workflow's ONLY
# job is to keep a "Version Packages" PR open that aggregates queued
# changesets, so pending releases are visible. It does NOT publish to npm.
#
# (History: the prior version also ran `changeset:publish` in CI; that step
# failed on every run because the npm auth path is local-only, which made a
# routine red run look like a broken publish. Trimmed to version-PR-only.)

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version-pr:
    name: Version PR
    runs-on: ubuntu-latest
    # Do not run on the auto-generated changeset version-PR commits to avoid
    # an infinite loop when the bot's PR is merged back to main.
    if: github.repository == 'Protocol-Wealth/pwos-core'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Required so changesets can read git tags + push the version PR.
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Run tests
        run: pnpm -r test

      - name: Open / update the Version Packages PR
        id: changesets
        uses: changesets/action@v1
        with:
          # version-only: with no `publish` input, changesets/action opens or
          # updates the "Version Packages" PR when changesets are pending and
          # does NOTHING when there are none. It never publishes to npm — that
          # is the maintainer's local `pnpm changeset:publish` step.
          version: pnpm changeset:version
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
